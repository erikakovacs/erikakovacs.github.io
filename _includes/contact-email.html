{% assign email_local = "erikapappkovacs" %}
{% assign email_host = "gmail.com" %}
<div class="contact-email">
  <p class="contact-email__intro">For enquires, please reach out by e-mail:</p>
  <button
    type="button"
    class="contact-email__reveal"
    data-e="ZXJpa2FwYXBwa292YWNzQGdtYWlsLmNvbQ=="
    aria-expanded="false"
    aria-controls="contact-email-address"
  >
    <i class="far fa-fw fa-envelope" aria-hidden="true"></i>
    Show email address
  </button>
  <p id="contact-email-address" class="contact-email__address" hidden>
    <a href="#" class="contact-email__link" translate="no"></a>
  </p>
  <noscript>
    <p class="contact-email__fallback">{{ email_local }} [at] {{ email_host | replace: ".", " [dot] " }}</p>
  </noscript>
</div>
<script>
  (function () {
    var btn = document.querySelector(".contact-email__reveal");
    if (!btn) return;

    btn.addEventListener("click", function () {
      var panel = document.getElementById("contact-email-address");
      var link = panel && panel.querySelector(".contact-email__link");
      if (!panel || !link || btn.getAttribute("aria-expanded") === "true") return;

      var email = atob(btn.dataset.e);
      link.textContent = email;
      link.href = "mailto:" + email;
      panel.hidden = false;
      btn.hidden = true;
      btn.setAttribute("aria-expanded", "true");
      link.focus();
    });
  })();
</script>
